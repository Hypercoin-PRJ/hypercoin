description "Hypercoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env HYPERCOIND_BIN="/usr/bin/hypercoind"
env HYPERCOIND_USER="hypercoin"
env HYPERCOIND_GROUP="hypercoin"
env HYPERCOIND_PIDDIR="/var/run/hypercoind"
# upstart can't handle variables constructed with other variables
env HYPERCOIND_PIDFILE="/var/run/hypercoind/hypercoind.pid"
env HYPERCOIND_CONFIGFILE="/etc/hypercoin/hypercoin.conf"
env HYPERCOIND_DATADIR="/var/lib/hypercoind"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # hypercoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$HYPERCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run hypercoind."
        echo "The setting must appear in $HYPERCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Hypercoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$HYPERCOIND_PIDDIR"
    chmod 0755 "$HYPERCOIND_PIDDIR"
    chown $HYPERCOIND_USER:$HYPERCOIND_GROUP "$HYPERCOIND_PIDDIR"
    chown $HYPERCOIND_USER:$HYPERCOIND_GROUP "$HYPERCOIND_CONFIGFILE"
    chmod 0660 "$HYPERCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$HYPERCOIND_PIDFILE" \
    --chuid $HYPERCOIND_USER:$HYPERCOIND_GROUP \
    --exec "$HYPERCOIND_BIN" \
    -- \
    -pid="$HYPERCOIND_PIDFILE" \
    -conf="$HYPERCOIND_CONFIGFILE" \
    -datadir="$HYPERCOIND_DATADIR" \
    -disablewallet \
    -daemon

